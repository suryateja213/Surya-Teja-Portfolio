name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Hashed assets: long, immutable cache.
      - name: Sync hashed assets
        run: |
          aws s3 sync out/ "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" --exclude "*.txt" --exclude "*.xml" --exclude "*.json"

      # HTML + metadata: revalidate every time so updates show immediately.
      - name: Sync HTML and metadata
        run: |
          aws s3 sync out/ "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" --include "*.html" --include "*.txt" --include "*.xml" --include "*.json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
