name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read
  pull-requests: write # plan comment

env:
  TF_DIR: infra/terraform/environments/prod

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.4"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -input=false
      - run: terraform validate
      - name: Plan
        run: terraform plan -input=false -no-color
        env:
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_admin_password_hash: ${{ secrets.TF_VAR_ADMIN_PASSWORD_HASH }}

  apply:
    # Only on push to main, gated by the prod environment's required reviewers.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.4"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - run: terraform init -input=false
      - name: Apply
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_admin_password_hash: ${{ secrets.TF_VAR_ADMIN_PASSWORD_HASH }}
