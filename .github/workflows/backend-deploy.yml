name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install runtime deps as Linux x86_64 wheels matching the Lambda runtime,
      # then zip them with app/ at the archive root.
      - name: Build deployment package
        run: |
          rm -rf build && mkdir -p build/pkg
          pip install -r requirements.txt -t build/pkg \
            --platform manylinux2014_x86_64 --implementation cp \
            --python-version 3.12 --only-binary=:all: --upgrade
          cp -r app build/pkg/app
          find build/pkg -name '__pycache__' -type d -prune -exec rm -rf {} +
          cd build/pkg && zip -qr ../function.zip . -x '*.pyc'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://build/function.zip
          aws lambda wait function-updated \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}"

      - name: Smoke test
        run: |
          set -e
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.API_BASE_URL }}/v1/health")
          echo "health -> $code"
          test "$code" = "200"
